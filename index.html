<style>
body{
    margin:0;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:0;
    width:100%;
}

.tile{
    aspect-ratio:1/1;
    overflow:hidden;
}

.tile img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    transition:transform 0.15s ease;
}

.tile:hover img{
    transform:scale(1.02);
}
    
</style>

<div class="gallery" id="gallery"></div>

<script>
const galleries = [

[
"https://your-ceramic-1.jpg",
"https://your-reference-1.jpg"
],

[
"https://your-ceramic-2.jpg",
"https://your-reference-2.jpg"
],

[
"https://your-ceramic-3.jpg",
"https://your-reference-3.jpg"
],

[
"https://your-ceramic-4.jpg",
"https://your-reference-4.jpg"
],

[
"https://your-ceramic-5.jpg",
"https://your-reference-5.jpg"
],

[
"https://your-ceramic-6.jpg",
"https://your-reference-6.jpg"
]

];

const gallery = document.getElementById("gallery");

galleries.forEach(images => {

    // preload both images
    images.forEach(src => {
        const preload = new Image();
        preload.src = src;
    });

    const tile = document.createElement("div");
    tile.className = "tile";

    const img = document.createElement("img");
    img.src = images[0];

    tile.appendChild(img);
    gallery.appendChild(tile);

    tile.addEventListener("mouseenter", () => {
        img.src = images[1];
    });

    tile.addEventListener("mouseleave", () => {
        img.src = images[0];
    });

});
</script>
